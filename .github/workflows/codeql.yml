name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly, so newly-published CodeQL queries run against the codebase
    # even without new commits.
    - cron: '27 4 * * 1'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: analyze (go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Install the exact toolchain from go.mod before CodeQL builds, so the
      # extractor compiles against go1.26 rather than a runner-default Go.
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: go
          build-mode: manual
          queries: security-and-quality

      - name: Build
        run: go build ./...

      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:go
